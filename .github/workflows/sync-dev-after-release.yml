name: Sync dev after release

on:
  push:
    branches:
      - main

jobs:
  sync-dev:
    name: Reset dev to main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Reset dev to main (only if no new work on dev)
        run: |
          git checkout dev

          # Compare trees: if dev has new content beyond main, skip reset
          DIFF=$(git diff origin/main origin/dev --stat)
          if [ -n "$DIFF" ]; then
            echo "⚠️  dev has new commits not in main — skipping reset to avoid data loss."
            echo "$DIFF"
            exit 0
          fi

          git reset --hard origin/main
          git push --force-with-lease origin dev
          echo "✅ dev reset to main successfully."
